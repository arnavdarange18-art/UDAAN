<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UDAAN | Take Flight Towards Your Future</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --sky1:#38bdf8;
  --sky2:#0ea5e9;
  --deep:#1e3a8a;
  --sun:#f97316;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#64748b;
  --radius:18px;
}

*{
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(180deg,var(--sky1),var(--sky2));
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.hero-text{
  text-align:center;
  margin-bottom:28px;
}

.hero-text h1{
  font-size:40px;
  font-weight:800;
  margin:0;
}

.hero-text p{
  font-size:16px;
  margin-top:10px;
  opacity:0.95;
}

.auth-card{
  width:380px;
  background:var(--card);
  padding:34px;
  border-radius:var(--radius);
  box-shadow:0 35px 70px rgba(0,0,0,0.25);
  text-align:center;
  color:var(--text);
}

.logo{
  font-size:36px;
  font-weight:800;
  color:var(--deep);
  margin-bottom:18px;
}

.tabs{
  display:flex;
  background:#f1f5f9;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:22px;
}

.tab{
  flex:1;
  padding:10px;
  border:none;
  background:transparent;
  cursor:pointer;
  font-weight:600;
}

.tab.active{
  background:var(--deep);
  color:white;
}

.form{
  display:none;
  flex-direction:column;
}

.form.active{
  display:flex;
}

input,select{
  padding:12px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid #d1d5db;
  font-size:14px;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--deep);
}

.btn{
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--deep),var(--sun));
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

footer{
  margin-top:16px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="hero-text">
  <h1 id="tagline">Take Flight Towards Your Future</h1>
  <p>Career guidance that lifts rural dreams beyond limits</p>
</div>

<div class="auth-card">
  <div class="logo">UDAAN</div>

  <div class="tabs">
    <button class="tab active" onclick="showLogin()">Login</button>
    <button class="tab" onclick="showRegister()">Register</button>
  </div>

  <form class="form active" id="loginForm" method="POST" action="/">
    <input type="text" name="contact" placeholder="Email / Mobile" required>
    <input type="password" name="password" placeholder="Password" required>
    <button class="btn" type="submit">Login</button>
  </form>

  <form class="form" id="registerForm" method="POST" action="/signup">
    <input type="text" name="fullname" placeholder="Full Name" required>
    <input type="text" name="contact" placeholder="Email / Mobile" required>
    <input type="password" name="password" placeholder="Create Password" required>

    <select name="class" id="classSelect" onchange="handleClass()" required>
      <option value="">Current Class</option>
      <option value="10">10th</option>
      <option value="11">11th</option>
      <option value="12">12th</option>
    </select>

    <select name="stream" id="streamSelect" style="display:none;">
      <option value="">Select Stream</option>
      <option>Science</option>
      <option>Commerce</option>
      <option>Arts</option>
    </select>

    <button class="btn" type="submit">Create Account</button>
  </form>

  <footer>© 2026 UDAN • Career Guidance Platform</footer>
</div>

<script>
function showLogin(){
  loginForm.classList.add("active");
  registerForm.classList.remove("active");
  document.querySelectorAll(".tab")[0].classList.add("active");
  document.querySelectorAll(".tab")[1].classList.remove("active");
}

function showRegister(){
  registerForm.classList.add("active");
  loginForm.classList.remove("active");
  document.querySelectorAll(".tab")[1].classList.add("active");
  document.querySelectorAll(".tab")[0].classList.remove("active");
}

function handleClass(){
  if(classSelect.value==="11" || classSelect.value==="12"){
    streamSelect.style.display="block";
    streamSelect.required=true;
  }else{
    streamSelect.style.display="none";
    streamSelect.required=false;
    streamSelect.value="";
  }
}

const taglines=[
  "Take Flight Towards Your Future",
  "Every Dream Deserves an UDAAN",
  "From Rural Roots to Rising Heights",
  "Your Career. Your Direction. Your Udaan."
];
let i=0;
setInterval(()=>{
  i=(i+1)%taglines.length;
  document.getElementById("tagline").innerText=taglines[i];
},3500);
</script>

</body>
</html>
